spring:
  application:
    name: notify-hub
  datasource:
    url: jdbc:postgresql://localhost:5432/notifyhub
    username: postgres
    password: secret
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: notifyhub-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.notifyhub.*"
        spring.json.use.type.headers: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

app:
  kafka:
    topics:
      high: notification.high
      medium: notification.medium
      low: notification.low
      dlq-email: dlq.email
      dlq-sms: dlq.sms
      dlq-push: dlq.push
  rate-limit:
    default-limit: 5000
    window-seconds: 10
  providers:
    email:
      api-key: dummy-sendgrid-key
      from: noreply@notifyhub.com
      simulated-failure-rate: 0.0
      simulated-latency-ms: 50
    sms:
      account-sid: dummy-twilio-sid
      auth-token: dummy-twilio-token
      from: "+1234567890"
      simulated-failure-rate: 0.0
      simulated-latency-ms: 50
    push:
      fcm-server-key: dummy-fcm-key
      apns-key: dummy-apns-key
      simulated-failure-rate: 0.0
      simulated-latency-ms: 50

resilience4j:
  circuitbreaker:
    instances:
      emailProvider:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
      smsProvider:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
      pushProvider:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
  retry:
    instances:
      emailProvider:
        maxAttempts: 3
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      smsProvider:
        maxAttempts: 3
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      pushProvider:
        maxAttempts: 3
        waitDuration: 2s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,circuitbreakers,retries
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

server:
  port: 8080

logging:
  level:
    com.notifyhub: INFO
    org.springframework.kafka: WARN
